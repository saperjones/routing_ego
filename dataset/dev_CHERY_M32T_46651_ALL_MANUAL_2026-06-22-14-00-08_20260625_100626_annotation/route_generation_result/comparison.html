        const waypoints = [[31.835319258677753, 117.139122896763], [31.834703852544237, 117.13857777552721], [31.83520341943659, 117.13802821057797], [31.83572860811951, 117.13753285582739], [31.835509046843484, 117.13702776990831], [31.835148563053718, 117.13689813588613], [31.835363445595114, 117.13614799753326], [31.83574413317179, 117.13704772317847], [31.835913261812575, 117.13815282343982], [31.83614896595749, 117.13862322711003]];
        const waypointYaws = [180.0, 265.5, 4.2, 269.9, 176.8, 226.7, 359.8, 90.8, 19.3, 90.1];

        // ===== 工具函数 =====

        // 计算两点间的方位角（度，正北为0，顺时针）
        function bearingDeg(a, b) {
            const rad = Math.PI / 180;
            const dLon = (b[1] - a[1]) * Math.cos((a[0] + b[0]) / 2 * rad);
            const dLat = (b[0] - a[0]);
            return Math.atan2(dLon, dLat) * 180 / Math.PI;
        }

        // 计算两点间的距离（米）
        function distanceM(a, b) {
            const R = 6371000;
            const rad = Math.PI / 180;
            const dLat = (b[0] - a[0]) * rad;
            const dLon = (b[1] - a[1]) * rad;
            const x = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(a[0]*rad) * Math.cos(b[0]*rad) *
                     Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
            return R * c;
        }

        // 创建方向箭头标记
        function arrowMarker(latlon, bearing, color = '#d62728') {
            const icon = L.divIcon({
                className: 'route-arrow',
                html: `<svg width="16" height="16" viewBox="0 0 16 16" style="transform:rotate(${bearing.toFixed(1)}deg)">` +
                      `<path d="M8 1 L14 14 L8 10.5 L2 14 Z" fill="#ffffff" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/></svg>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8],
            });
            return L.marker(latlon, { icon, interactive: false, keyboard: false });
        }

        // 沿轨迹添加方向箭头
        function addRouteArrows(points, color, spacing = 60) {
            const arrows = L.layerGroup();
            if (points.length < 2) return arrows;

            let accumulated = 0;
            let lastArrowIdx = 0;

            for (let i = 1; i < points.length; i++) {
                const d = distanceM(points[i-1], points[i]);
                accumulated += d;

                if (accumulated >= spacing) {
                    const bearing = bearingDeg(points[i-1], points[i]);
                    const arrow = arrowMarker(points[i], bearing, color);
                    arrows.addLayer(arrow);
                    accumulated = 0;
                    lastArrowIdx = i;
                }
            }

            return arrows;
        }

        // ===== 绘制轨迹 =====

        // Ego 轨迹（蓝色，带箭头）
        const egoLine = L.polyline(egoTrack, {
            color: '#3388ff',
            weight: 4,
            opacity: 0.8
        }).addTo(map);
        egoLine.bindPopup('原始 Ego 轨迹<br>长度: 1143.6 m');

        // Ego 轨迹方向箭头
        const egoArrows = addRouteArrows(egoTrack, '#3388ff', 50);
        egoArrows.addTo(map);

        // 规划轨迹（红色，带箭头）
        const routeLine = L.polyline(plannedRoute, {
            color: '#ff3333',
            weight: 3,
            opacity: 0.8
        }).addTo(map);
        routeLine.bindPopup('规划轨迹<br>长度: 1021.2 m');

        // 规划轨迹方向箭头
        const routeArrows = addRouteArrows(plannedRoute, '#ff3333', 50);
        routeArrows.addTo(map);

        // 途径点（绿色，显示方向）
        waypoints.forEach((wp, i) => {
            const marker = L.circleMarker(wp, {
                radius: 5,
                fillColor: '#33ff33',
                fillOpacity: 1,
                color: 'white',
                weight: 2
            }).addTo(map);

            let popupText = `途径点 ${i+1}`;
            if (waypointYaws[i] !== undefined) {
                popupText += `<br>方向: ${waypointYaws[i].toFixed(1)}°`;

                // 添加途径点方向箭头（橙色）
                const arrow = arrowMarker(wp, waypointYaws[i], '#ff8800');
                arrow.addTo(map);
            }
            marker.bindPopup(popupText);
        });

        // 起点（大绿点）
        if (egoTrack.length > 0) {
            L.circleMarker(egoTrack[0], {
                radius: 8,
                fillColor: '#00ff00',
                fillOpacity: 1,
                color: 'white',
                weight: 3
            }).bindPopup('起点<br>航向: 173.4°').addTo(map);
        }

        // 终点（大红点）
        if (egoTrack.length > 0) {
            L.circleMarker(egoTrack[egoTrack.length-1], {
                radius: 8,
                fillColor: '#ff0000',
                fillOpacity: 1,
                color: 'white',
                weight: 3
            }).bindPopup('终点').addTo(map);
        }

        // 自适应缩放
        const bounds = egoLine.getBounds().extend(routeLine.getBounds());
        map.fitBounds(bounds, {padding: [80, 80]});
    </script>
